version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: justiceflowx-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: justiceflowx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d justiceflowx"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: justiceflowx-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:securepassword123@db:5432/justiceflowx
      - THREAT_INTEL_MOCK_MODE=false
      - VIRUSTOTAL_API_KEY=aa6c05a60dfa6dc418c456cda3cf48ef8c5c57398f7c1f96aa2d46b33a8ccc2d
      - ABUSEIPDB_API_KEY=9ff8ece82d5bd2055f9cb0f033bcc99ac86a13909305923ff3f30ae275202014a13060d5ea472a1d
      - OTX_API_KEY=596dbb96b1b810bd1f12afd0fcfa33bdc177845916ce652d2584512ee3b9887f
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Hot-reloading for local dev

  frontend:
    image: nginx:alpine
    container_name: justiceflowx-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
